<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="决策陪练">
    <meta name="theme-color" content="#f5f5f7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <title>决策陪练</title>
    <style>
        :root {
            --bg: #f5f5f7;
            --card: rgba(255,255,255,0.72);
            --card-hover: rgba(255,255,255,0.9);
            --text: #1c1c1e;
            --text-secondary: #6c6c70;
            --accent: #007aff;
            --green: #34c759;
            --red: #ff3b30;
            --orange: #ff9500;
            --border: rgba(0,0,0,0.06);
            --radius: 16px;
            --radius-lg: 20px;
            --navbar-bg: rgba(255,255,255,0.72);
            --tabbar-bg: rgba(255,255,255,0.72);
            --shadow: 0 2px 16px rgba(0,0,0,0.05), 0 1px 4px rgba(0,0,0,0.03);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.08), 0 2px 8px rgba(0,0,0,0.04);
            --glass-border: rgba(255,255,255,0.5);
            --gradient-accent: linear-gradient(135deg, #007aff 0%, #5856d6 100%);
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card: rgba(44,44,46,0.65);
                --card-hover: rgba(58,58,60,0.8);
                --text: #f5f5f7;
                --text-secondary: #98989f;
                --accent: #0a84ff;
                --green: #30d158;
                --red: #ff453a;
                --orange: #ff9f0a;
                --border: rgba(255,255,255,0.08);
                --navbar-bg: rgba(18,18,18,0.78);
                --tabbar-bg: rgba(18,18,18,0.78);
                --shadow: 0 2px 16px rgba(0,0,0,0.3), 0 1px 4px rgba(0,0,0,0.2);
                --shadow-lg: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.25);
                --glass-border: rgba(255,255,255,0.1);
                --gradient-accent: linear-gradient(135deg, #0a84ff 0%, #5e5ce6 100%);
            }
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding-bottom: 80px;
        }

        /* 顶部导航 */
        .navbar {
            position: sticky;
            top: 0;
            background: var(--navbar-bg);
            backdrop-filter: blur(24px) saturate(200%);
            border-bottom: 1px solid var(--border);
            padding: 16px 20px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }
        .navbar-btn {
            background: none;
            border: none;
            color: var(--accent);
            font-size: 14px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s ease;
        }
        .navbar-btn:hover { background: rgba(10,132,255,0.1); }
        .navbar-btn:active { transform: scale(0.96); }

        /* 底部Tab */
        .tab-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--tabbar-bg);
            backdrop-filter: blur(24px) saturate(200%);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 12px 20px;
            z-index: 100;
        }
        .tab-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            padding: 6px 18px;
            border-radius: 12px;
            transition: all 0.25s ease;
            border: none;
            background: none;
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 500;
        }
        .tab-item.active {
            color: var(--accent);
            background: rgba(10,132,255,0.08);
        }
        .tab-item .tab-icon { font-size: 22px; }

        /* 页面容器 */
        .page { display: none; padding: 20px; }
        .page.active { display: block; }

        /* 卡片 */
        .card {
            background: var(--card);
            backdrop-filter: blur(20px) saturate(180%);
            border-radius: var(--radius);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }

        /* 聊天界面 */
        .chat-container {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 180px);
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 16px;
        }
        .message {
            margin-bottom: 12px;
            display: flex;
            flex-direction: column;
        }
        .message.ai .bubble {
            background: var(--card);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            align-self: flex-start;
            border-radius: 6px 20px 20px 20px;
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
        }
        .message.user .bubble {
            background: var(--gradient-accent);
            align-self: flex-end;
            border-radius: 20px 6px 20px 20px;
            color: #fff;
            box-shadow: 0 2px 12px rgba(0,122,255,0.25);
        }
        .bubble {
            max-width: 85%;
            padding: 12px 16px;
            font-size: 15px;
            line-height: 1.55;
            white-space: pre-wrap;
        }
        .chat-input-area {
            display: flex;
            gap: 8px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
        }
        .chat-input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            resize: none;
            max-height: 100px;
        }
        .chat-input:focus { border-color: var(--accent); }
        .chat-send {
            background: var(--gradient-accent);
            border: none;
            border-radius: 50%;
            width: 38px;
            height: 38px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            align-self: flex-end;
            box-shadow: 0 2px 8px rgba(0,122,255,0.25);
            transition: all 0.2s ease;
        }
        .chat-send:hover { box-shadow: 0 4px 16px rgba(0,122,255,0.35); }
        .chat-send:active { transform: scale(0.93); }
        .chat-send:disabled { opacity: 0.4; cursor: not-allowed; box-shadow: none; }

        /* 持仓列表 */
        .holding-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0;
            border-bottom: 0.5px solid rgba(128,128,128,0.12);
            transition: all 0.2s ease;
        }
        .holding-item:last-child { border-bottom: none; }
        .holding-name { font-size: 16px; font-weight: 600; letter-spacing: -0.2px; }
        .holding-meta { font-size: 13px; color: var(--text-secondary); margin-top: 5px; }
        .holding-right { text-align: right; }
        .holding-reason {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 5px;
            max-width: 220px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .tag {
            display: inline-block;
            font-size: 12px;
            padding: 3px 9px;
            border-radius: 6px;
            margin-right: 4px;
            font-weight: 500;
        }
        .tag-stop { background: rgba(255,69,58,0.1); color: var(--red); }
        .tag-target { background: rgba(48,209,88,0.1); color: var(--green); }

        /* 按钮 */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 13px 22px;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
        }
        .btn-primary {
            background: var(--gradient-accent);
            color: white;
            box-shadow: 0 2px 12px rgba(0,122,255,0.2);
        }
        .btn-primary:hover {
            box-shadow: 0 4px 20px rgba(0,122,255,0.35);
            transform: translateY(-1px);
        }
        .btn-primary:active { transform: scale(0.97); box-shadow: none; }
        .btn-danger { background: rgba(255,69,58,0.12); color: var(--red); }
        .btn-full { width: 100%; }

        /* 表单 */
        .form-group { margin-bottom: 16px; }
        .form-label {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 6px;
            display: block;
            font-weight: 500;
        }
        .form-input {
            width: 100%;
            background: var(--bg);
            border: 1.5px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 15px;
            outline: none;
            transition: all 0.2s ease;
        }
        .form-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0,122,255,0.12);
        }

        /* 复盘日志 */
        .log-item {
            padding: 14px 0;
            border-bottom: 0.5px solid rgba(128,128,128,0.12);
            transition: all 0.2s ease;
        }
        .log-item:last-child { border-bottom: none; }
        .log-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }
        .log-stock { font-weight: 600; letter-spacing: -0.2px; }
        .log-result { font-weight: 700; }
        .log-detail { font-size: 14px; color: var(--text-secondary); line-height: 1.7; }

        /* 统计 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }
        .stat-item {
            background: var(--card);
            backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius);
            padding: 16px 12px;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .stat-value { font-size: 22px; font-weight: 800; margin-bottom: 4px; letter-spacing: -0.5px; }
        .stat-label { font-size: 12px; color: var(--text-secondary); font-weight: 500; }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }
        .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .empty-text { font-size: 15px; }

        /* 设置弹窗 */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(6px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 200;
            padding: 20px;
        }
        .modal-overlay.show { display: flex; }
        .modal-overlay.show .modal {
            animation: modalIn 0.3s ease forwards;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: translateY(16px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        .modal {
            background: var(--card);
            backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-lg);
            padding: 28px 24px;
            width: 100%;
            max-width: 400px;
            max-height: calc(100vh - 60px);
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }
        .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 18px; letter-spacing: -0.3px; }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 22px;
        }
        .modal-actions .btn { flex: 1; }
        .btn-secondary {
            background: rgba(128,128,128,0.12);
            color: var(--text);
        }
        .btn-secondary:hover { background: rgba(128,128,128,0.18); }

        /* 加载动画 */
        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 8px 14px;
        }
        .typing-dot {
            width: 6px;
            height: 6px;
            background: var(--text-secondary);
            border-radius: 50%;
            animation: typing 1.2s ease-in-out infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-4px); }
        }

        /* 加载动画 spinner */
        .spinner {
            display: inline-block;
            width: 24px;
            height: 24px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ====== iPhone 16 / 移动端适配 (393pt宽) ====== */
        @media (max-width: 480px) {
            body {
                padding-bottom: 80px;
                -webkit-tap-highlight-color: transparent;
                -webkit-text-size-adjust: 100%;
            }
            .page { padding: 16px; }
            .navbar { padding: 14px 16px; }
            .navbar h1 { font-size: 18px; }
            .tab-bar { padding: 8px 12px 20px; }
            .tab-item { padding: 8px 16px; font-size: 10px; gap: 4px; }
            .tab-item .tab-icon { font-size: 22px; }
            .card { padding: 16px; margin-bottom: 12px; border-radius: 14px; }
            .btn { padding: 14px 20px; font-size: 15px; min-height: 48px; border-radius: 12px; }
            .navbar-btn { padding: 10px 14px !important; font-size: 14px !important; min-height: 40px; border-radius: 10px !important; }
            .form-input, select, textarea { padding: 14px 16px; font-size: 16px !important; min-height: 48px; border-radius: 12px; }
            .chat-input { padding: 14px 18px; font-size: 16px !important; min-height: 48px; border-radius: 24px; }
            .chat-send { width: 48px; height: 48px; font-size: 20px; }
            .chat-input-area { gap: 8px; padding-top: 14px; }
            .modal { padding: 24px 20px; border-radius: 20px; max-height: calc(100vh - 60px); }
            .modal h2 { font-size: 18px; margin-bottom: 16px; }
            .modal-overlay { padding: 16px; }
            .modal-actions { flex-direction: column; gap: 8px; }
            .modal-actions .btn { width: 100%; min-height: 48px; }
            .holding-item { padding: 14px 0; }
            .holding-name { font-size: 16px; }
            .holding-meta { font-size: 13px; margin-top: 6px; }
            .holding-reason { max-width: none; font-size: 13px; white-space: normal !important; margin-top: 6px; }
            .log-item { padding: 14px 0; }
            .log-detail { font-size: 13px; line-height: 1.8; }
            .stats-grid { gap: 8px; }
            .stat-item { padding: 14px 10px; border-radius: 12px; }
            .stat-value { font-size: 20px; }
            .stat-label { font-size: 11px; }
            .bubble { max-width: 88%; padding: 12px 16px; font-size: 15px; line-height: 1.6; }
            .empty-state { padding: 50px 20px; }
            .empty-icon { font-size: 52px; }
            .empty-text { font-size: 16px; }
            .form-group { margin-bottom: 14px; }
            .form-label { font-size: 14px; margin-bottom: 8px; }
            .tag { font-size: 12px; padding: 4px 10px; }
        }

        @media (max-width: 380px) {
            .stats-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .stat-item { padding: 10px 6px; }
            .stat-value { font-size: 17px; }
            .page { padding: 12px; }
        }

        /* 弹窗打开时禁止背景滚动 */
        body.modal-open { overflow: hidden; position: fixed; width: 100%; }

        /* iPhone Safari 专项优化 (Dynamic Island + Home Indicator) */
        @supports (-webkit-touch-callout: none) {
            html {
                height: -webkit-fill-available;
            }
            body {
                min-height: -webkit-fill-available;
                padding-bottom: calc(80px + env(safe-area-inset-bottom));
                -webkit-overflow-scrolling: touch;
            }
            .navbar {
                padding-top: calc(14px + env(safe-area-inset-top));
            }
            .tab-bar {
                padding-bottom: calc(8px + env(safe-area-inset-bottom));
                height: calc(56px + env(safe-area-inset-bottom));
            }
            .page {
                padding-bottom: 16px;
            }
            .chat-container {
                min-height: calc(100vh - 200px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
            }
            .chat-input-area {
                padding-bottom: 4px;
            }
            .modal {
                max-height: calc(100vh - env(safe-area-inset-top) - env(safe-area-inset-bottom) - 60px);
            }
            .modal-overlay {
                padding-top: calc(16px + env(safe-area-inset-top));
                padding-bottom: calc(16px + env(safe-area-inset-bottom));
            }
            .form-input, .chat-input, select, textarea {
                font-size: 16px !important;
                -webkit-appearance: none;
                appearance: none;
            }
            /* 防止 Safari 自动缩放 */
            input[type="text"], input[type="number"], input[type="password"], input[type="date"], textarea, select {
                font-size: 16px !important;
            }
        }
    </style>
</head>
<body>
    <!-- 顶部导航 -->
    <div class="navbar">
        <h1 id="pageTitle">决策陪练</h1>
        <button class="navbar-btn" id="settingsBtn">设置</button>
    </div>

    <!-- 页面1：聊天 -->
    <div class="page active" id="pageTrain">
        <!-- 聊天列表视图 -->
        <div id="chatListView">
            <div id="chatHistoryList"></div>
            <button class="btn" onclick="newChat()" style="width:100%;margin-top:16px;font-size:14px;padding:11px 0;border-radius:14px;background:var(--gradient-accent);color:#fff;box-shadow:0 2px 10px rgba(0,122,255,0.2);">+ 新建对话</button>
        </div>
        <!-- 对话视图 -->
        <div id="chatDetailView" style="display:none;">
            <div style="margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;">
                <button class="navbar-btn" onclick="backToChatList()" style="padding:4px 0;">← 返回列表</button>
                <button class="navbar-btn" onclick="summarizeChat()" style="font-size:13px;padding:4px 10px;border:1px solid var(--border);border-radius:12px;">📋 一键汇总</button>
            </div>
            <div class="chat-container">
                <div class="chat-messages" id="chatMessages"></div>
                <div class="chat-input-area">
                    <textarea class="chat-input" id="chatInput" placeholder="说说你的交易想法..." rows="1"></textarea>
                    <button class="chat-send" id="chatSend">↑</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 页面2：持仓管理 -->
    <div class="page" id="pageHoldings">
        <div id="holdingsContent"></div>
    </div>

    <!-- 页面3：复盘日志 -->
    <div class="page" id="pageReview">
        <div id="reviewContent"></div>
    </div>

    <!-- 页面4：交易日记 -->
    <div class="page" id="pageDiary">
        <div id="diaryContent"></div>
    </div>

    <!-- 页面5：余额 -->
    <div class="page" id="pageBalance">
        <div id="balanceContent">
            <div class="empty-state">
                <div class="empty-icon">💰</div>
                <div class="empty-text">正在查询余额...</div>
            </div>
        </div>
    </div>

    <!-- 底部Tab -->
    <div class="tab-bar">
        <button class="tab-item active" data-page="pageTrain">
            <span class="tab-icon">🧠</span>
            <span>决策</span>
        </button>
        <button class="tab-item" data-page="pageHoldings">
            <span class="tab-icon">📊</span>
            <span>持仓</span>
        </button>
        <button class="tab-item" data-page="pageReview">
            <span class="tab-icon">🎯</span>
            <span>复盘</span>
        </button>
        <button class="tab-item" data-page="pageDiary">
            <span class="tab-icon">💭</span>
            <span>情绪</span>
        </button>
        <button class="tab-item" data-page="pageBalance">
            <span class="tab-icon">💰</span>
            <span>余额</span>
        </button>
    </div>

    <!-- 设置弹窗 -->
    <div class="modal-overlay" id="settingsModal">
        <div class="modal">
            <h2>设置</h2>
            <div class="form-group">
                <label class="form-label">DeepSeek API Key</label>
                <input type="password" class="form-input" id="settingsApiKey" placeholder="sk-..." />
            </div>
            <div class="form-group">
                <label class="form-label">投资风格（AI 会基于此调整建议方向）</label>
                <div id="presetStylesContainer" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;"></div>
                <div id="styleTagsContainer" style="display:none;"></div>
                <button class="btn btn-secondary" id="addStyleTag" style="display:none;">+ 添加自定义</button>
            </div>
            <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
                <label class="form-label">数据管理</label>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-secondary" style="flex:1;font-size:13px;" onclick="exportData()">导出备份</button>
                    <button class="btn btn-secondary" style="flex:1;font-size:13px;" onclick="document.getElementById('importFile').click()">导入数据</button>
                </div>
                <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)" />
            </div>
            <div class="modal-actions">
                <button class="btn btn-secondary" id="settingsCancel">取消</button>
                <button class="btn btn-primary" id="settingsSave">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加持仓弹窗 -->
    <div class="modal-overlay" id="addHoldingModal">
        <div class="modal">
            <h2>记录持仓</h2>
            <div class="form-group">
                <label class="form-label">股票名称</label>

    <script>
    // ====== 数据存储 ======
    const DB = {
        get(key, defaultVal = null) {
            const v = localStorage.getItem('stockcoach_' + key);
            return v ? JSON.parse(v) : defaultVal;
        },
        set(key, val) {
            localStorage.setItem('stockcoach_' + key, JSON.stringify(val));
        }
    };

    // ====== Safari 弹窗滚动穿透修复 ======
    let scrollPos = 0;
    function openModal(id) {
        scrollPos = window.scrollY;
        document.body.classList.add('modal-open');
        document.body.style.top = -scrollPos + 'px';
        document.getElementById(id).classList.add('show');
    }
    function closeModal(id) {
        document.getElementById(id).classList.remove('show');
        document.body.classList.remove('modal-open');
        document.body.style.top = '';
        window.scrollTo(0, scrollPos);
    }

    // ESC 关闭所有弹窗
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            document.querySelectorAll('.modal-overlay.show').forEach(modal => {
                closeModal(modal.id);
            });
        }
    });

    // ====== 状态 ======
    let holdings = DB.get('holdings', []);
    let reviews = DB.get('reviews', []);
    let chatSessions = DB.get('chatSessions', []);  // [{id, title, messages, createdAt}]
    let currentSessionId = null;
    let chatHistory = [];
    let apiKey = DB.get('apiKey', '');
    const PRESET_STYLES = ['保守型 - 稳健为主，低波动', '均衡型 - 兼顾收益与风险', '进取型 - 追求高收益，能承受波动'];
    let selectedPresets = DB.get('selectedPresets', [1]); // 默认选中"均衡型"
    let investStyles = DB.get('investStyles', []);
    function fmtStop(v) { return +v === 0 ? '不止损' : '止损' + v; }
    function fmtTarget(v) { return +v === 0 ? '不止盈' : '目标' + v; }

    // ====== Tab切换 ======
    const tabs = document.querySelectorAll('.tab-item');
    const pages = document.querySelectorAll('.page');
    const pageTitle = document.getElementById('pageTitle');
    const titles = { pageTrain: '决策对话', pageHoldings: '我的持仓', pageReview: '复盘中心', pageDiary: '情绪日记', pageBalance: '余额' };

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            const target = tab.dataset.page;
            tabs.forEach(t => t.classList.remove('active'));
            pages.forEach(p => p.classList.remove('active'));
            tab.classList.add('active');
            document.getElementById(target).classList.add('active');
            pageTitle.textContent = titles[target];
            if (target === 'pageTrain') { backToChatList(); }
            if (target === 'pageHoldings') renderHoldings();
            if (target === 'pageReview') renderReviews();
            if (target === 'pageDiary') renderDiary();
            if (target === 'pageBalance') queryBalance();
        });
    });

    // ====== 设置 ======
    const settingsBtn = document.getElementById('settingsBtn');
    const settingsModal = document.getElementById('settingsModal');
    const settingsApiKey = document.getElementById('settingsApiKey');

    function renderPresetStyles() {
        const container = document.getElementById('presetStylesContainer');
        container.innerHTML = PRESET_STYLES.map((s, i) => {
            const active = selectedPresets.includes(i);
            return `<button type="button" class="navbar-btn" onclick="togglePreset(${i})" style="font-size:13px;padding:6px 12px;border-radius:16px;border:1px solid ${active ? 'var(--accent)' : 'var(--border)'};background:${active ? 'var(--accent)' : 'transparent'};color:${active ? '#fff' : 'var(--text)'};">${s}</button>`;
        }).join('');
    }

    function togglePreset(idx) {
        selectedPresets = selectedPresets[0] === idx ? [] : [idx];
        if (selectedPresets.length > 0) {
            investStyles = [];
            renderStyleTags();
        }
        renderPresetStyles();
    }

    function renderStyleTags() {
        const container = document.getElementById('styleTagsContainer');
        container.innerHTML = investStyles.map((s, i) => `
            <div style="display:flex;gap:6px;align-items:center;">
                <input type="text" class="form-input styleTagInput" value="${escapeHtml(s)}" placeholder="如：只做低估值蓝筹" style="flex:1;margin:0;" />
                <button class="navbar-btn" onclick="removeStyleTag(${i})" style="color:var(--red);font-size:18px;padding:4px 8px;">×</button>
            </div>
        `).join('');
        document.getElementById('addStyleTag').style.display = 'none';
    }

    document.getElementById('addStyleTag').addEventListener('click', () => {
        if (investStyles.length >= 3) return;
        investStyles.push('');
        selectedPresets = [];
        renderPresetStyles();
        renderStyleTags();
        const inputs = document.querySelectorAll('.styleTagInput');
        if (inputs.length > 0) inputs[inputs.length - 1].focus();
    });

    function removeStyleTag(idx) {
        investStyles.splice(idx, 1);
        renderStyleTags();
    }

    let savedPresets = [];
    let savedStyles = [];
    settingsBtn.addEventListener('click', () => {
        savedPresets = [...selectedPresets];
        savedStyles = [...investStyles];
        settingsApiKey.value = apiKey;
        renderPresetStyles();
        renderStyleTags();
        openModal('settingsModal');
    });
    document.getElementById('settingsCancel').addEventListener('click', () => {
        selectedPresets = savedPresets;
        investStyles = savedStyles;
        closeModal('settingsModal');
    });
    document.getElementById('settingsSave').addEventListener('click', () => {
        apiKey = settingsApiKey.value.trim();
        const inputs = document.querySelectorAll('.styleTagInput');
        investStyles = Array.from(inputs).map(el => el.value.trim()).filter(v => v);
        DB.set('apiKey', apiKey);
        DB.set('investStyles', investStyles);
        DB.set('selectedPresets', selectedPresets);
        closeModal('settingsModal');
        const toast = document.createElement('div');
        toast.textContent = '✓ 设置已保存';
        toast.style.cssText = 'position:fixed;top:80px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;padding:10px 20px;border-radius:20px;font-size:14px;font-weight:600;z-index:999;animation:modalIn 0.3s ease;';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1500);
    });

    // ====== 数据导出/导入 ======
    function exportData() {
        const data = {};
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('stockcoach_')) {
                data[key] = localStorage.getItem(key);
            }
        }
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `stockcoach_backup_${new Date().toISOString().split('T')[0]}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function importData(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            try {
                const data = JSON.parse(e.target.result);
                if (!confirm(`确认导入？将覆盖当前所有数据（${Object.keys(data).length} 条记录）`)) return;
                Object.keys(data).forEach(key => {
                    localStorage.setItem(key, data[key]);
                });
                alert('导入成功，页面即将刷新');
                location.reload();
            } catch (err) {
                alert('导入失败：文件格式错误');
            }
        };
        reader.readAsText(file);
        event.target.value = '';
    }

    // ====== 加仓功能 ======
    let addPosIndex = -1;
    function showAddPosition(index) {
        addPosIndex = index;
        const h = holdings[index];
        document.getElementById('addPositionTitle').textContent = `加仓 ${h.name}`;
        document.getElementById('addPosCurrentInfo').innerHTML = `当前持仓：<strong>${h.qty}股</strong>，成本价：<strong>${h.price}</strong>，总成本：<strong>${(h.price * h.qty).toFixed(2)}</strong>`;
        document.getElementById('addPosPrice').value = '';
        document.getElementById('addPosQty').value = '';
        document.getElementById('addPosReason').value = '';
        document.getElementById('addPosCalcResult').style.display = 'none';
        openModal('addPositionModal');
    }

    function calcAddPosition() {
        if (addPosIndex < 0) return;
        const h = holdings[addPosIndex];
        const newPrice = +document.getElementById('addPosPrice').value;
        const newQty = +document.getElementById('addPosQty').value;
        const resultDiv = document.getElementById('addPosCalcResult');
        if (!newPrice || !newQty) { resultDiv.style.display = 'none'; return; }

        const totalQty = h.qty + newQty;
        const totalCost = h.price * h.qty + newPrice * newQty;
        const avgPrice = (totalCost / totalQty).toFixed(3);

        resultDiv.style.display = 'block';
        document.getElementById('addPosCalcText').innerHTML = `加仓后：<strong>${totalQty}股</strong>，持仓均价：<strong>${avgPrice}</strong>，总成本：<strong>${totalCost.toFixed(2)}</strong>`;
    }

    function saveAddPosition() {
        if (addPosIndex < 0) return;
        const price = +document.getElementById('addPosPrice').value;
        const qty = +document.getElementById('addPosQty').value;
        const reason = document.getElementById('addPosReason').value.trim();
        if (!price || !qty) { alert('请填写价格和数量'); return; }

        const h = holdings[addPosIndex];
        if (!h.buys) h.buys = [{ price: h.price, qty: h.qty, date: h.date }];
        const totalCost = h.price * h.qty + price * qty;
        const totalQty = h.qty + qty;
        h.price = +(totalCost / totalQty).toFixed(3);
        h.qty = totalQty;
        if (reason) h.reason = h.reason + '；加仓：' + reason;
        h.buys.push({ price, qty, date: new Date().toISOString().split('T')[0], reason });

        DB.set('holdings', holdings);
        closeModal('addPositionModal');
        renderHoldings();
    }

    // ====== 聊天功能 ======
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const chatSend = document.getElementById('chatSend');
    const chatListView = document.getElementById('chatListView');
    const chatDetailView = document.getElementById('chatDetailView');

    // 渲染聊天列表
    function renderChatList() {
        const list = document.getElementById('chatHistoryList');
        if (chatSessions.length === 0) {
            list.innerHTML = `<div class="empty-state"><div class="empty-icon">💬</div><div class="empty-text">开始你的第一次决策对话</div><p style="color:var(--text-secondary);font-size:14px;margin-top:8px">每一次下单前，先和 AI 聊聊</p></div>`;
            return;
        }
        list.innerHTML = chatSessions.slice().reverse().map(s => `
            <div class="card" style="cursor:pointer;margin-bottom:8px;" onclick="openChat('${s.id}')">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <div style="font-size:15px;font-weight:500;">${escapeHtml(s.title)}</div>
                        <div style="font-size:13px;color:var(--text-secondary);margin-top:4px;">${s.createdAt} · ${s.messages.length}条消息</div>
                    </div>
                    <button class="navbar-btn" onclick="event.stopPropagation();deleteChat('${s.id}')" style="color:var(--red);font-size:13px;">删除</button>
                </div>
            </div>
        `).join('');
    }

    // 新建对话
    function newChat() {
        const session = {
            id: Date.now().toString(),
            title: '新对话',
            messages: [],
            createdAt: new Date().toISOString().split('T')[0]
        };
        chatSessions.push(session);
        DB.set('chatSessions', chatSessions);
        openChat(session.id);
    }

    // 打开对话
    function openChat(sessionId) {
        currentSessionId = sessionId;
        const session = chatSessions.find(s => s.id === sessionId);
        if (!session) return;
        chatHistory = session.messages;
        chatListView.style.display = 'none';
        chatDetailView.style.display = 'block';
        renderChat();
    }

    // 返回列表
    function backToChatList() {
        chatDetailView.style.display = 'none';
        chatListView.style.display = 'block';
        currentSessionId = null;
        renderChatList();
    }

    // 删除对话
    function deleteChat(sessionId) {
        if (!confirm('删除这条对话记录？')) return;
        chatSessions = chatSessions.filter(s => s.id !== sessionId);
        DB.set('chatSessions', chatSessions);
        renderChatList();
    }

    function renderChat() {
        if (chatHistory.length === 0) {
            chatMessages.innerHTML = '';
            const welcomeText = '你好，我是你的决策陪练。\n\n每次交易前跟我聊聊，我帮你检查盲区：\n• "我想买中芯国际，你觉得呢"\n• "持仓跌了8%，该止损吗"\n• "今天大涨想追，帮我冷静下"';
            appendBubble('assistant', welcomeText);
            return;
        }
        chatMessages.innerHTML = '';
        chatHistory.forEach(msg => {
            appendBubble(msg.role, msg.content);
        });
        scrollChat();
    }

    function appendBubble(role, content) {
        const div = document.createElement('div');
        div.className = `message ${role === 'assistant' ? 'ai' : 'user'}`;
        const html = role === 'assistant' ? renderMarkdown(content) : escapeHtml(content);
        div.innerHTML = `<div class="bubble">${html}</div>`;
        chatMessages.appendChild(div);
    }

    function addAIMessage(content) {
        chatHistory.push({ role: 'assistant', content });
        saveCurrentSession();
        appendBubble('assistant', content);
        scrollChat();
    }

    function addUserMessage(content) {
        chatHistory.push({ role: 'user', content });
        saveCurrentSession();
        appendBubble('user', content);
        scrollChat();
    }

    function saveCurrentSession() {
        if (!currentSessionId) return;
        const session = chatSessions.find(s => s.id === currentSessionId);
        if (session) {
            session.messages = chatHistory;
            // 用第一条用户消息作为标题
            const firstUser = chatHistory.find(m => m.role === 'user');
            if (firstUser) {
                session.title = firstUser.content.slice(0, 20) + (firstUser.content.length > 20 ? '...' : '');
            }
            DB.set('chatSessions', chatSessions);
        }
    }

    function showTyping() {
        const div = document.createElement('div');
        div.className = 'message ai';
        div.id = 'typingIndicator';
        div.innerHTML = `<div class="bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
        chatMessages.appendChild(div);
        scrollChat();
    }

    function removeTyping() {
        const el = document.getElementById('typingIndicator');
        if (el) el.remove();
    }

    function scrollChat() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    chatInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
    chatInput.addEventListener('input', () => {
        chatInput.style.height = 'auto';
        chatInput.style.height = Math.min(chatInput.scrollHeight, 100) + 'px';
    });
    chatSend.addEventListener('click', sendMessage);

    async function sendMessage() {
        const text = chatInput.value.trim();
        if (!text) return;
        if (!apiKey) {
            alert('需要先配置 API Key，点击右上角⚙️设置');
            return;
        }

        chatInput.value = '';
        chatSend.disabled = true;
        addUserMessage(text);
        showTyping();

        try {
            const systemPrompt = buildSystemPrompt();
            const messages = [
                { role: 'system', content: systemPrompt },
                ...chatHistory.slice(-20).map(m => ({ role: m.role, content: m.content }))
            ];

            const response = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${apiKey}`
                },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages,
                    temperature: 0.7,
                    max_tokens: 800
                })
            });

            if (!response.ok) {
                throw new Error(`API错误(${response.status})`);
            }

            const data = await response.json();
            const reply = data.choices[0].message.content;

            removeTyping();
            addAIMessage(reply);

            // 检查是否要保存决策卡片
            checkForDecisionCard(reply, text);

        } catch (error) {
            removeTyping();
            addAIMessage(`抱歉，出错了：${error.message}`);
        }

        chatSend.disabled = false;
    }

    function buildSystemPrompt() {
        const allStyles = [
            ...selectedPresets.map(i => PRESET_STYLES[i]),
            ...investStyles
        ];
        const styleText = allStyles.length > 0 ? allStyles.join('；') : '未设置';

        let holdingsInfo = '';
        if (holdings.length > 0) {
            holdingsInfo = '\n\n当前持仓：\n' + holdings.map(h =>
                `- ${h.name}：买入价${h.price}，${h.qty}股，${fmtStop(h.stop)}，${fmtTarget(h.target)}，理由：${h.reason}，日期：${h.date || '未知'}`
            ).join('\n');
        }

        let reviewsInfo = '';
        if (reviews.length > 0) {
            const recent = reviews.slice(-10);
            const totalProfit = reviews.reduce((s, r) => s + r.profit, 0).toFixed(2);
            const winRate = ((reviews.filter(r => r.profit > 0).length / reviews.length) * 100).toFixed(0);
            reviewsInfo = `\n\n用户的复盘数据（共${reviews.length}笔交易，胜率${winRate}%，累计盈亏${totalProfit}元）：\n` + recent.map(r =>
                `- ${r.name}：买入价${r.buyPrice}→卖出价${r.sellPrice}，收益率${r.rate >= 0 ? '+' : ''}${r.rate}%，数量${r.qty}股，盈亏${r.profit}元，持有${r.buyDate}~${r.sellDate}，买入理由：${r.reason}，卖出理由：${r.sellReason || '未填写'}`
            ).join('\n');
        }

        return `你是一个股票决策陪练助手。你的角色是帮助用户在买入或卖出前理清思路，避免冲动交易。

用户投资风格：${styleText}
${holdingsInfo}
${reviewsInfo}

你的工作方式：
1. 当用户说想买某只股票时，追问3个关键问题：买入逻辑是什么？计划仓位多少？如果跌了怎么办（止损线）？
2. 当用户说想卖时，帮他回顾买入理由是否还成立，情绪是否在影响判断
3. 当用户慌张时，帮他冷静分析，不要附和恐慌情绪
4. 永远不要直接说"买"或"不买"，而是通过提问让用户自己想清楚
5. 如果发现用户的决策存在明显风险（如仓位过重、追高、情绪化），直接指出
6. 用户提到某只持仓股或历史交易时，结合上面的数据给出针对性回应

语气要求：像一个有经验的朋友，直接、不啰嗦、偶尔可以幽默。用口语化中文。回复控制在3-5句话以内。`;
    }

    async function summarizeChat() {
        if (!apiKey) { alert('请先在设置中配置 API Key'); return; }
        if (chatHistory.length < 2) { alert('至少聊几轮才能生成摘要'); return; }

    // ====== 持仓消息热点（30分钟缓存，可手动刷新） ======
    function getNewsCacheKey() {
        const today = new Date().toISOString().split('T')[0];
        const now = new Date();
        const half = Math.floor(now.getMinutes() / 30) * 30;
        return 'holdingNews_' + today + '_' + now.getHours() + '_' + half;
    }
    function refreshHoldingNews() {
        const key = getNewsCacheKey();
        localStorage.removeItem('stockcoach_' + key);
        // 也清理其他旧缓存
        for (let i = localStorage.length - 1; i >= 0; i--) {
            const k = localStorage.key(i);
            if (k && k.startsWith('stockcoach_holdingNews_')) {
                localStorage.removeItem(k);
            }
        }
        loadHoldingNews();
    }

    async function loadHoldingNews() {
        if (!apiKey) return;
        const now = new Date();
        const today = now.toISOString().split('T')[0];
        const names = holdings.filter(h => h.name).map(h => h.name);
        if (names.length === 0) return;

        const cacheKey = getNewsCacheKey();
        // 清理过期的新闻缓存
        for (let i = localStorage.length - 1; i >= 0; i--) {
            const k = localStorage.key(i);
            if (k && k.startsWith('stockcoach_holdingNews_') && k !== 'stockcoach_' + cacheKey) {
                localStorage.removeItem(k);
            }
        }
        const cached = DB.get(cacheKey, null);
        if (cached) {
            renderHoldingNews(cached);
            return;
        }

        holdings.forEach((h, i) => {
            const div = document.getElementById('holdingNews_' + i);
            if (div) div.innerHTML = '<div style="font-size:12px;color:var(--text-secondary);">📰 加载最新消息中...</div>';
        });

        try {
            const resp = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: '你是股票消息面分析助手。请给出每只股票从3个月前到今天为止的真实市场消息热点（政策、财报、行业动态、资金流向、机构评级、重大事件等），每只股票至少10条，每条标注【利好】或【利空】或【中性】。要求：1）消息必须是真实事件，不要编造；2）按时间倒序排列，最新的在前；3）每条消息要有具体日期；4）重点关注对股价有实质影响的消息；5）消息时间范围为最近3个月内，截止到今天。输出JSON数组格式，每个元素包含stock(股票名)、news数组(每条含title消息标题、date消息日期(格式如2026-05-15)、detail详细分析该消息对股价的影响及原因(50-80字)、type值为good/bad/neutral)。只输出JSON，不要其他文字。' },
                        { role: 'user', content: `今天是${now.toLocaleDateString('zh-CN')}（${now.toLocaleTimeString('zh-CN')}）。请给出以下股票从${new Date(now.getTime() - 90 * 86400000).toLocaleDateString('zh-CN')}到今天的消息热点，按时间倒序，最新的在前：${names.join('、')}` }
                    ],
                    temperature: 0.3, max_tokens: 4000
                })
            });
            const data = await resp.json();
            const text = data.choices[0].message.content;
            const jsonMatch = text.match(/\[[\s\S]*\]/);
            if (jsonMatch) {
                const newsData = JSON.parse(jsonMatch[0]);
                newsData._updatedAt = now.toLocaleString('zh-CN');
                DB.set(cacheKey, newsData);
                renderHoldingNews(newsData);
            }
        } catch(e) {
            holdings.forEach((h, i) => {
                const div = document.getElementById('holdingNews_' + i);
                if (div) div.innerHTML = '';
            });
        }
    }

        holdings.forEach((h, i) => {

                    </div>`;

                        { role: 'user', content: `今日${new Date().toLocaleDateString('zh-CN')}，我的交易记录（共${reviews.length}笔，胜率${winRate}%，累计盈亏${totalProfit}元）：\n${tradesText}${holdingsContext}` }
                    ],

        const h = holdings[index];
        document.getElementById('sellTitle').textContent = `卖出 ${h.name}`;
        document.getElementById('sellQty').value = h.qty;
        document.getElementById('sellQty').max = h.qty;
        document.getElementById('sellQtyHint').textContent = `当前持有 ${h.qty} 股，买入价 ${h.price}`;

        document.getElementById('sellDate').value = new Date().toISOString().split('T')[0];
        document.getElementById('sellReason').value = '';
        openModal('sellHoldingModal');
    }

    document.getElementById('sellHoldingCancel').addEventListener('click', () => {
        closeModal('sellHoldingModal');
    });

    document.getElementById('sellHoldingSave').addEventListener('click', () => {
        if (sellingIndex < 0) return;
        const h = holdings[sellingIndex];
        const qty = Math.min(+document.getElementById('sellQty').value, h.qty);
        const sellPrice = +document.getElementById('sellPrice').value;

        if (qty <= 0 || isNaN(qty)) { alert('请输入有效数量'); return; }
        if (!sellPrice || isNaN(sellPrice)) { alert('请输入卖出价格'); return; }

        const profit = ((sellPrice - h.price) * qty).toFixed(2);
        const rate = (((sellPrice - h.price) / h.price) * 100).toFixed(2);

        const sellReason = document.getElementById('sellReason').value.trim() || '未填写';
        const newReview = {
            name: h.name, buyPrice: h.price, sellPrice,
            qty, profit: +profit, rate: +rate,
            reason: h.reason, sellReason,
            buyDate: h.date, sellDate: document.getElementById('sellDate').value || new Date().toISOString().split('T')[0]
        };
        reviews.push(newReview);
        DB.set('reviews', reviews);

        if (qty >= h.qty) {
            holdings.splice(sellingIndex, 1);
        } else {
            holdings[sellingIndex].qty = h.qty - qty;
        }
        DB.set('holdings', holdings);
        closeModal('sellHoldingModal');
        renderHoldings();
        scoreDecision(reviews.length - 1);
    });

    // 获取实时指数行情（腾讯股票API，支持CORS）
    async function fetchRealTimeIndices() {
        const indices = [
            { code: 'sh000001', name: '上证指数' },
            { code: 'sz399006', name: '创业板指' },
            { code: 'hkHSI', name: '恒生指数' },
            { code: 'usNDX', name: '纳斯达克100' },
            { code: 'usINX', name: '标普500' }
        ];
        const codeStr = indices.map(i => i.code).join(',');
        try {
            const resp = await fetch(`https://qt.gtimg.cn/q=${codeStr}`, { mode: 'cors' });
            const buf = await resp.arrayBuffer();
            const text = new TextDecoder('gbk').decode(buf);
            const results = [];
            indices.forEach((idx, i) => {
                const regex = new RegExp(`v_${idx.code}="([^"]+)"`);
                const match = text.match(regex);
                if (!match) return;
                const parts = match[1].split('~');
                if (parts.length < 5) return;
                const name = parts[1] || idx.name;
                const price = parseFloat(parts[3]);
                const prevClose = parseFloat(parts[4]);
                if (isNaN(price) || isNaN(prevClose)) return;
                const change = price - prevClose;
                const changePct = ((change / prevClose) * 100).toFixed(2);
                const isUp = change > 0;
                const isDown = change < 0;
                results.push({
                    name: name,
                    value: price.toFixed(2),
                    change: (isUp ? '+' : '') + changePct + '%',
                    direction: isUp ? 'up' : isDown ? 'down' : 'flat'
                });
            });
            return results.length > 0 ? results : null;
        } catch (e) {
            return null;
        }
    }

    // ====== 盈亏曲线图 ======
    function renderProfitChart() {
        if (reviews.length < 2) return '';
        const sorted = reviews.slice().sort((a, b) => (a.sellDate || '').localeCompare(b.sellDate || ''));
        let cumulative = 0;
        const points = sorted.map(r => { cumulative += r.profit; return { value: cumulative }; });

        const width = 200, height = 60, padX = 4, padY = 8;
        const values = points.map(p => p.value);
        const maxVal = Math.max(...values, 0);
        const minVal = Math.min(...values, 0);
        const range = maxVal - minVal || 1;

        const getX = (i) => padX + (i / (points.length - 1)) * (width - padX * 2);
        const getY = (v) => padY + ((maxVal - v) / range) * (height - padY * 2);

        const lineColor = cumulative >= 0 ? 'var(--red)' : 'var(--green)';

        return `<div class="card" style="margin-bottom:12px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;">
            <div>
                <div style="font-size:11px;color:var(--text-secondary);">累计盈亏</div>
                <div style="font-size:18px;font-weight:700;color:${lineColor};margin-top:2px;">${cumulative >= 0 ? '+' : ''}${cumulative.toFixed(0)}元</div>
            </div>
            <svg width="120" height="40" viewBox="0 0 ${width} ${height}" style="display:block;">
                <polyline points="${points.map((p, i) => `${getX(i).toFixed(1)},${getY(p.value).toFixed(1)}`).join(' ')}" fill="none" stroke="${lineColor}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>`;
    }

        '01-01': '元旦', '02-14': '情人节', '03-08': '妇女节', '04-05': '清明节',
        '05-01': '劳动节', '05-04': '青年节', '06-01': '儿童节', '06-18': '618',

    // ====== 股票实时价格 ======
    const priceCache = {};

    async function fetchPrice(code) {
        if (!code) return null;
        const cached = priceCache[code];
        if (cached && Date.now() - cached.ts < 60000) return cached.data;
        try {
            const resp = await fetch(`https://qt.gtimg.cn/q=${code}`);
            const buffer = await resp.arrayBuffer();
            const decoder = new TextDecoder('gbk');
            const text = decoder.decode(buffer);
            const match = text.match(/="(.+)"/);
            if (!match) return null;
            const parts = match[1].split('~');
            if (parts.length < 35) return null;
            const result = { name: parts[1], price: +parts[3], yesterday: +parts[4], open: +parts[5], high: +parts[33], low: +parts[34], change: +parts[31], changePct: +parts[32] };
            priceCache[code] = { data: result, ts: Date.now() };
            return result;
        } catch(e) { return null; }
    }

    async function updateHoldingPrices() {
        for (let i = 0; i < holdings.length; i++) {
            const h = holdings[i];
            if (!h.code) continue;
            const el = document.getElementById('livePrice_' + i);
            if (!el) continue;
            const data = await fetchPrice(h.code);
            if (data) {
                const pnlPct = ((data.price - h.price) / h.price * 100).toFixed(2);
                const color = +pnlPct >= 0 ? 'var(--red)' : 'var(--green)';
                const arrow = +pnlPct >= 0 ? '↑' : '↓';
                let pnlText = `${+pnlPct >= 0 ? '+' : ''}${pnlPct}%`;
                if (h.qty > 0) {
                    const pnl = (data.price - h.price) * h.qty;

                }
                el.innerHTML = `<span style="font-weight:700;font-size:15px;">${data.price.toFixed(2)}</span>
                    <span style="color:${color};font-size:13px;margin-left:4px;">${arrow}${Math.abs(data.changePct).toFixed(2)}%</span>
                    <span style="color:${color};font-size:13px;margin-left:6px;">浮盈 ${pnlText}</span>`;
            } else {
                el.innerHTML = '<span style="color:var(--text-secondary);font-size:13px;">价格获取失败</span>';
            }
        }
    }

                const p = await fetchPrice(h.code);
                if (p) {
                    const pnl = ((p.price - h.price) / h.price * 100).toFixed(2);
                    priceInfo = `，现价${p.price}(浮盈${pnl}%)`;
                }
            }
            return `${h.name}(成本${h.price},${h.qty}股,${fmtStop(h.stop)},${fmtTarget(h.target)},持有${days}天,理由:${h.reason}${priceInfo})`;
        }));

        try {
            const resp = await fetch('https://api.deepseek.com/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: 'deepseek-chat',
                    messages: [
                        { role: 'system', content: '你是股票投资教练。请结合每只股票从3个月前到今天为止的真实消息面（政策、财报、行业动态等），逐只给出今日推荐操作。格式要求：用markdown，每只股票用"### 股票名"作为标题单独一段，内容包含推荐操作（**持有/加仓/减仓/止盈/止损**加粗标注）、近3个月消息面依据、买入逻辑是否成立。最后用"### 整体提醒"给1-2句心态提醒。' },
                        { role: 'user', content: `今天${new Date().toLocaleDateString('zh-CN')}，我的持仓：\n${holdingsDetails.join('\n')}\n\n请结合消息面给出每只股票的推荐操作。` }
                    ],
                    temperature: 0.7, max_tokens: 1500
                })
            });
            const data = await resp.json();
            container.innerHTML = `<div style="font-size:13px;line-height:1.8;color:var(--text);">${renderMarkdown(data.choices[0].message.content)}</div>`;
        } catch(e) {
            container.innerHTML = '<div style="font-size:13px;color:var(--red);">建议生成失败，请稍后重试</div>';
        }
    }

    // ====== 情绪趋势对比图 ======
    function renderMoodTrendChart() {
        const marketHistory = DB.get('marketSentimentHistory', []);
        const recent = diaryEntries.slice(-14);
        if (recent.length === 0 && marketHistory.length === 0) return '';

        const allDates = new Set();
        recent.forEach(d => allDates.add(d.date));
        marketHistory.forEach(m => allDates.add(m.date));
        const dates = Array.from(allDates).sort().slice(-14);
        if (dates.length === 0) return '';

        const personalPoints = dates.map(date => {
            const entry = diaryEntries.find(d => d.date === date);
            return entry ? (entry.mood / 4) * 100 : null;
        });
        const marketPoints = dates.map(date => {
            const entry = marketHistory.find(m => m.date === date);
            return entry ? entry.score : null;
        });

        const hasPersonal = personalPoints.some(v => v !== null);
        const hasMarket = marketPoints.some(v => v !== null);

        const w = 320, h = 160, pl = 6, pr = 6, pt = 12, pb = 24;
        const cw = w - pl - pr, ch = h - pt - pb;
        const getX = (i) => dates.length === 1 ? w / 2 : pl + (i / (dates.length - 1)) * cw;
        const getY = (v) => pt + ((100 - v) / 100) * ch;

        // 贝塞尔曲线平滑
        function buildSmoothPath(points) {
            const valid = [];
            points.forEach((v, i) => { if (v !== null) valid.push({ x: getX(i), y: getY(v) }); });
            if (valid.length === 0) return '';
            if (valid.length === 1) return '';
            let d = `M${valid[0].x.toFixed(1)},${valid[0].y.toFixed(1)}`;
            for (let i = 1; i < valid.length; i++) {
                const prev = valid[i - 1], curr = valid[i];
                const cpx = (prev.x + curr.x) / 2;
                d += ` C${cpx.toFixed(1)},${prev.y.toFixed(1)} ${cpx.toFixed(1)},${curr.y.toFixed(1)} ${curr.x.toFixed(1)},${curr.y.toFixed(1)}`;
            }
            return d;
        }

        // 面积填充路径
        function buildAreaPath(points, pathD) {
            if (!pathD) return '';
            const valid = [];
            points.forEach((v, i) => { if (v !== null) valid.push({ x: getX(i), y: getY(v) }); });
            if (valid.length < 2) return '';
            const bottom = pt + ch;
            return pathD + ` L${valid[valid.length-1].x.toFixed(1)},${bottom} L${valid[0].x.toFixed(1)},${bottom} Z`;
        }

        const pPath = buildSmoothPath(personalPoints);
        const mPath = buildSmoothPath(marketPoints);
        const pArea = buildAreaPath(personalPoints, pPath);
        const mArea = buildAreaPath(marketPoints, mPath);

        // 数据点（带白边）
        const pDots = personalPoints.map((v, i) => v !== null ? `<circle cx="${getX(i).toFixed(1)}" cy="${getY(v).toFixed(1)}" r="4" fill="#fff" stroke="#007aff" stroke-width="2"/><circle cx="${getX(i).toFixed(1)}" cy="${getY(v).toFixed(1)}" r="2" fill="#007aff"/>` : '').join('');
        const mDots = marketPoints.map((v, i) => v !== null ? `<circle cx="${getX(i).toFixed(1)}" cy="${getY(v).toFixed(1)}" r="4" fill="#fff" stroke="#ff9500" stroke-width="2"/><circle cx="${getX(i).toFixed(1)}" cy="${getY(v).toFixed(1)}" r="2" fill="#ff9500"/>` : '').join('');

        // 日期标签
        let lblIdx;
        if (dates.length <= 4) lblIdx = dates.map((_, i) => i);
        else if (dates.length <= 7) lblIdx = [0, Math.floor(dates.length / 2), dates.length - 1];
        else lblIdx = [0, Math.floor(dates.length / 3), Math.floor(dates.length * 2 / 3), dates.length - 1];
        const dateLbls = lblIdx.map(i => `<text x="${getX(i).toFixed(1)}" y="${h - 6}" text-anchor="middle" font-size="10" font-family="-apple-system,sans-serif" fill="var(--text-secondary)">${dates[i].slice(5)}</text>`).join('');

        // 水平区域背景（贪婪/中性/恐惧）
        const zones = `
            <rect x="${pl}" y="${pt}" width="${cw}" height="${ch * 0.3}" rx="0" fill="rgba(255,59,48,0.04)"/>
            <rect x="${pl}" y="${pt + ch * 0.3}" width="${cw}" height="${ch * 0.4}" rx="0" fill="rgba(128,128,128,0.03)"/>
            <rect x="${pl}" y="${pt + ch * 0.7}" width="${cw}" height="${ch * 0.3}" rx="0" fill="rgba(52,199,89,0.04)"/>
        `;
        const zoneLabels = `
            <text x="${w - pr - 2}" y="${pt + 10}" text-anchor="end" font-size="9" font-family="-apple-system,sans-serif" fill="var(--text-secondary)" opacity="0.6">贪婪</text>
            <text x="${w - pr - 2}" y="${getY(50).toFixed(1)}" text-anchor="end" font-size="9" font-family="-apple-system,sans-serif" fill="var(--text-secondary)" opacity="0.6" dominant-baseline="middle">中性</text>
            <text x="${w - pr - 2}" y="${pt + ch - 4}" text-anchor="end" font-size="9" font-family="-apple-system,sans-serif" fill="var(--text-secondary)" opacity="0.6">恐惧</text>
        `;

        // 50线
        const midLine = `<line x1="${pl}" y1="${getY(50).toFixed(1)}" x2="${w - pr}" y2="${getY(50).toFixed(1)}" stroke="var(--text-secondary)" stroke-width="0.5" stroke-dasharray="4,4" opacity="0.3"/>`;

        // 最新值标注
        const lastP = personalPoints.filter(v => v !== null).pop();
        const lastM = marketPoints.filter(v => v !== null).pop();
        let valueLabels = '';
        if (lastP !== null && lastP !== undefined) {
            const li = personalPoints.lastIndexOf(lastP);
            valueLabels += `<text x="${Math.min(getX(li) + 6, w - 20).toFixed(1)}" y="${(getY(lastP) - 6).toFixed(1)}" font-size="10" font-weight="600" font-family="-apple-system,sans-serif" fill="#007aff">${Math.round(lastP)}</text>`;
        }
        if (lastM !== null && lastM !== undefined) {
            const li = marketPoints.lastIndexOf(lastM);
            valueLabels += `<text x="${Math.min(getX(li) + 6, w - 20).toFixed(1)}" y="${(getY(lastM) - 6).toFixed(1)}" font-size="10" font-weight="600" font-family="-apple-system,sans-serif" fill="#ff9500">${Math.round(lastM)}</text>`;
        }

        return `<div class="card" style="margin-bottom:16px;padding:18px 16px 14px;">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
                <span style="font-size:15px;font-weight:700;letter-spacing:-0.3px;">情绪趋势</span>
                <div style="display:flex;gap:14px;">
                    <span style="font-size:12px;color:#007aff;display:flex;align-items:center;gap:5px;font-weight:500;"><span style="display:inline-block;width:14px;height:3px;background:linear-gradient(90deg,#007aff,#5ac8fa);border-radius:2px;"></span>我</span>
                    <span style="font-size:12px;color:#ff9500;display:flex;align-items:center;gap:5px;font-weight:500;"><span style="display:inline-block;width:14px;height:3px;background:linear-gradient(90deg,#ff9500,#ffcc00);border-radius:2px;"></span>市场</span>
                </div>
            </div>
            <div style="overflow-x:auto;margin:0 -4px;">
                <svg width="100%" viewBox="0 0 ${w} ${h}" style="display:block;" preserveAspectRatio="xMidYMid meet">
                    <defs>
                        <linearGradient id="pGrad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#007aff" stop-opacity="0.2"/>
                            <stop offset="100%" stop-color="#007aff" stop-opacity="0"/>
                        </linearGradient>
                        <linearGradient id="mGrad" x1="0" y1="0" x2="0" y2="1">
                            <stop offset="0%" stop-color="#ff9500" stop-opacity="0.15"/>
                            <stop offset="100%" stop-color="#ff9500" stop-opacity="0"/>
                        </linearGradient>
                    </defs>
                    ${zones}
                    ${midLine}
                    ${zoneLabels}
                    ${pArea ? `<path d="${pArea}" fill="url(#pGrad)"/>` : ''}
                    ${mArea ? `<path d="${mArea}" fill="url(#mGrad)"/>` : ''}
                    ${pPath ? `<path d="${pPath}" fill="none" stroke="#007aff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>` : ''}
                    ${mPath ? `<path d="${mPath}" fill="none" stroke="#ff9500" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="6,4"/>` : ''}
                    ${pDots}
                    ${mDots}
                    ${valueLabels}
                    ${dateLbls}
                </svg>
            </div>
            ${!hasMarket ? '<div style="margin-top:10px;font-size:12px;color:var(--text-secondary);text-align:center;padding:8px;background:rgba(255,149,0,0.05);border-radius:8px;">点击上方「刷新」获取市场情绪，每天积累一个数据点</div>' : ''}
            ${!hasPersonal ? '<div style="margin-top:10px;font-size:12px;color:var(--text-secondary);text-align:center;padding:8px;background:rgba(0,122,255,0.05);border-radius:8px;">记录今日情绪即可生成个人趋势线</div>' : ''}
        </div>`;
    }

    function renderMarkdown(text) {
        let html = escapeHtml(text);
        html = html.replace(/^### (.+)/gm, '<div style="font-size:15px;font-weight:700;margin:12px 0 6px;">$1</div>');
        html = html.replace(/^## (.+)/gm, '<div style="font-size:16px;font-weight:700;margin:14px 0 8px;">$1</div>');
        html = html.replace(/^# (.+)/gm, '<div style="font-size:17px;font-weight:700;margin:16px 0 8px;">$1</div>');
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/\*(.+?)\*/g, '<em>$1</em>');
        html = html.replace(/`(.+?)`/g, '<code style="background:rgba(128,128,128,0.15);padding:1px 5px;border-radius:3px;font-size:14px;">$1</code>');
        html = html.replace(/^[-•] (.+)/gm, '<div style="padding-left:12px;">• $1</div>');
        html = html.replace(/^\d+\. (.+)/gm, '<div style="padding-left:12px;">$&</div>');
        html = html.replace(/\n/g, '<br>');
        return html;
    }

    // ====== 初始化 ======
    renderChatList();
    if (!apiKey) {
        setTimeout(() => openModal('settingsModal'), 500);
    }
    </script>
</body>
</html>
